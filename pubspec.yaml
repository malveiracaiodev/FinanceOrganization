name: finance_organization_mark_i
description: Aplicativo de controle financeiro pessoal (Mark I).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Ícones padrão iOS
  cupertino_icons: ^1.0.8

  # Armazenamento local simples
  shared_preferences: ^2.3.5

  # Abrir links externos
  url_launcher: ^6.3.1

  # Animações do ecossistema e texto pulsante Mark I
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Gerador automático de ícones para Android/iOS
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  # Mapeamento explícito de recursos do sistema
  assets:
    - assets/
    - assets/icone.png

# 🔥 Correção de sintaxe: Ajustado de 'flutter_icons' para 'flutter_launcher_icons'
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icone.png"
  adaptive_icon_background: "#060B16"   # Fundo escuro oficial da interface cibernética
  adaptive_icon_foreground: "assets/icone.png"