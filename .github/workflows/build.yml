name: Compilação Orbital (Finanças Mark I)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Gerar APK de Produção
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do Código Fonte
        uses: actions/checkout@v4

      - name: 2. Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Configurar Engine do Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 4. Instalar Dependências
        run: flutter pub get

      # 🔥 O PULO DO GATO: O GitHub Actions vai gerar os ícones nativos aqui!
      - name: 5. Injetar Ícones do Aplicativo
        run: dart run flutter_launcher_icons:generate

      - name: 6. Compilar APK (Release)
        run: flutter build apk --release

      - name: 7. Fazer Upload do Artefato
        uses: actions/upload-artifact@v4
        with:
          name: financas-mark-1-release
          path: build/app/outputs/flutter-apk/app-release.apk